sources:
  - name: python
    url: https://www.python.org/ftp/python/3.11.3/Python-3.11.3.tar.xz
    version: '3.11.3'
    subdir: 'sources'
    format: 'tar.xz'
    extract_path: 'Python-3.11.3'
    patch-path-strip: 1
    regenerate:
      # python is broken, adding automake or libtool ruins it
      - args: [ 'autoconf' ]
    tools_required:
      - host-autoconf-2.69
      - host-automake-1.16
      - host-libtool
      - host-pkgconf
      - host-autoconf-archive

tools:
  - name: host-python
    from_source: python
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
    compile:
      - args: ['make', '-j@PARALLELISM@']
    install:
      - args: ['make', 'install']

packages:
  - name: coreutils
    source:
      subdir: 'sources'
      url: 'https://ftpmirror.gnu.org/gnu/coreutils/coreutils-9.2.tar.xz'
      format: 'tar.xz'
      version: '9.2'
      extract_path: 'coreutils-9.2'
      patch-path-strip: 1
      tools_required:
        - host-autoconf-2.69
        - host-automake-1.16
      regenerate:
        - args: [ 'autoreconf', '-fvi' ]
    tools_required:
      - host-gcc
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - 'CFLAGS=-DSLOW_BUT_NO_HACKS -Wno-error'
        environ:
          gl_cv_header_working_stdint_h: 'yes'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: bash
    source:
      subdir: 'sources'
      url: https://ftpmirror.gnu.org/gnu/bash/bash-5.2.15.tar.gz
      version: '5.2.15'
      format: 'tar.gz'
      extract_path: 'bash-5.2.15'
      patch-path-strip: 1
      regenerate:
        - args: [ 'libtoolize', '-cfvi' ]
        - args: [ 'env', 'AUTOHEADER=true', 'autoreconf', '-fvi' ]
      tools_required:
        - host-libtool
        - host-autoconf-2.69
        - host-automake-1.16
    tools_required:
      - host-gcc
      - host-libtool
    pkgs_required:
      - mlibc
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--without-bash-malloc'
        environ:
          ac_cv_func_wcswidth: 'no'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'DESTDIR=@THIS_COLLECT_DIR@', 'install']
      - args: ['ln', '-sf', '/usr/bin/bash', '@THIS_COLLECT_DIR@/usr/bin/sh']

  - name: ncurses
    source:
      url: https://ftpmirror.gnu.org/gnu/ncurses/ncurses-6.4.tar.gz
      version: '6.4'
      subdir: 'sources'
      format: 'tar.gz'
      extract_path: 'ncurses-6.4'
      patch-path-strip: 1
      regenerate:
        - args: [ 'libtoolize', '-cfvi' ]
        - args: ['cp',
          '@BUILD_ROOT@/tools/host-automake-1.16/share/automake-1.16/config.sub',
          '@THIS_SOURCE_DIR@/']
    tools_required:
      - host-gcc
      - host-pkgconf
      - host-libtool
    pkgs_required:
      - mlibc
    revision: 4
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--without-ada'
        - '--enable-pc-files'
        - '--with-shared'
        - '--without-normal'
        - '--with-manpage-format=normal'
        - '--with-pkg-config-libdir=/usr/lib/pkgconfig'
        - '--with-termlib'
        - '--enable-widec'
        - '--disable-stripping'
        - '--with-sysroot=@SYSROOT_DIR@'
        - 'CFLAGS=-D_GNU_SOURCE'
        environ:
          cf_cv_func_nanosleep: 'yes'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'DESTDIR=@THIS_COLLECT_DIR@', 'install']
      # As we build ncurses with wide character support, make some compatibility links
      - args: |
          for lib in ncurses form panel menu tinfo ; do
              rm -vf                    @THIS_COLLECT_DIR@/usr/lib/lib${lib}.so
              echo "INPUT(-l${lib}w)" > @THIS_COLLECT_DIR@/usr/lib/lib${lib}.so
              ln -sfv ${lib}w.pc        @THIS_COLLECT_DIR@/usr/lib/pkgconfig/${lib}.pc
          done
          rm -vf                     @THIS_COLLECT_DIR@/usr/lib/libcursesw.so
          echo "INPUT(-lncursesw)" > @THIS_COLLECT_DIR@/usr/lib/libcursesw.so
          ln -sfv libncurses.so      @THIS_COLLECT_DIR@/usr/lib/libcurses.so

  - name: readline
    source:
      subdir: 'sources'
      url: 'https://ftpmirror.gnu.org/gnu/readline/readline-8.2.tar.gz'
      extract_path: 'readline-8.2'
      format: 'tar.gz'
      version: '8.2'
      regenerate:
        - args: [ 'libtoolize', '-cfvi' ]
        - args: [ 'env', 'AUTOHEADER=true', 'autoreconf', '-fvi' ]
      tools_required:
        - host-libtool
        - host-autoconf-2.69
        - host-automake-1.16
    tools_required:
      - host-gcc
    pkgs_required:
      - mlibc
      - ncurses
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--disable-static'
        - '--enable-multibyte'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'DESTDIR=@THIS_COLLECT_DIR@', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
      - args: |
                ln -sfv libreadline.so.8 @THIS_COLLECT_DIR@/usr/lib/libreadline.so

  - name: nano
    source:
      url: https://ftpmirror.gnu.org/gnu/nano/nano-7.2.tar.gz
      version: '7.2'
      subdir: 'sources'
      format: 'tar.gz'
      extract_path: 'nano-7.2'
      patch-path-strip: 1
      regenerate:
        - args: [ 'libtoolize', '-cfvi' ]
        - args: [ 'autoreconf', '-fvi' ]
      tools_required:
        - host-libtool
        - host-autoconf-2.69
        - host-automake-1.16
        - host-libtool
        - host-pkgconf
    tools_required:
      - host-gcc
      - host-libtool
    pkgs_required:
      - mlibc
      - ncurses
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        environ:
          ac_cv_func_wcswidth: 'no'
          gl_cv_header_working_stdint_h: 'yes'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'DESTDIR=@THIS_COLLECT_DIR@', 'install']

  - name: libexpat
    source:
      subdir: 'sources'
      url: https://github.com/libexpat/libexpat/releases/download/R_2_5_0/expat-2.5.0.tar.xz
      format: 'tar.xz'
      extract_path: 'expat-2.5.0'
      version: '2.5.0'
      tools_required:
        - host-autoconf-2.69
        - host-automake-1.16
        - host-libtool
        - host-pkgconf
      regenerate:
        - args: [ 'libtoolize', '-cfvi' ]
        - args: [ 'autoreconf', '-fvi' ]
    tools_required:
      - host-autoconf-2.69
      - host-automake-1.16
      - host-libtool
      - host-pkgconf
      - host-gcc
    pkgs_required:
      - mlibc
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--with-sysroot=@SYSROOT_DIR@'
        - '--without-xmlwf'
        - '--enable-shared'
        - '--disable-static'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
        quiet: true

  - name: libffi
    source:
      subdir: 'sources'
      url: https://gcc.gnu.org/pub/libffi/libffi-3.3.tar.gz
      format: 'tar.gz'
      extract_path: 'libffi-3.3'
      version: '3.3'
      tools_required:
        - host-autoconf-2.69
        - host-automake-1.16
        - host-libtool
      regenerate:
        - args: [ 'libtoolize', '-cfvi' ]
        - args: [ 'autoreconf', '-fvi' ]
    tools_required:
      - host-gcc
    pkgs_required:
      - mlibc
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--with-sysroot=@SYSROOT_DIR@'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install-strip']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: zlib
    source:
      subdir: 'sources'
      url: 'https://github.com/madler/zlib/archive/refs/tags/v1.2.12.tar.gz'
      format: 'tar.gz'
      extract_path: 'zlib-1.2.12'
      version: '1.2.12'
      patch-path-strip: 1
    tools_required:
      - host-gcc
    pkgs_required:
      - mlibc
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        environ:
          CHOST: '@OPTION:arch-triple@'
          prefix: '/usr'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: bzip2
    source:
      subdir: 'sources'
      url: 'https://sourceware.org/ftp/bzip2/bzip2-1.0.8.tar.gz'
      format: 'tar.gz'
      extract_path: 'bzip2-1.0.8'
      version: '1.0.8'
    tools_required:
      - host-gcc
    pkgs_required:
      - mlibc
    configure:
      - args: ['cp', '-r', '@THIS_SOURCE_DIR@/.', '@THIS_BUILD_DIR@']
      - args: 'sed -i s/"all: libbz2.a bzip2 bzip2recover test"/"all: libbz2.a bzip2 bzip2recover"/ @THIS_BUILD_DIR@/Makefile'
    build:
      # Building Makefile-libbz2_so first makes all programs link agains libbz2.so
      - args: ['make', 'CC=@OPTION:arch-triple@-gcc', 'CFLAGS=-fPIC', '-f', 'Makefile-libbz2_so']
      - args: ['make', 'clean']
      - args: ['make', 'CC=@OPTION:arch-triple@-gcc', 'CFLAGS=-fPIC', '-j@PARALLELISM@']
      - args: ['make', 'PREFIX=@THIS_COLLECT_DIR@/usr', 'install']
      - args: ['ln', '-sf', 'bzdiff', '@THIS_COLLECT_DIR@/usr/bin/bzcmp']
      - args: ['ln', '-sf', 'bzgrep', '@THIS_COLLECT_DIR@/usr/bin/bzegrep']
      - args: ['ln', '-sf', 'bzgrep', '@THIS_COLLECT_DIR@/usr/bin/bzfgrep']
      - args: ['ln', '-sf', 'bzmore', '@THIS_COLLECT_DIR@/usr/bin/bzless']

  - name: libiconv
    source:
      subdir: 'sources'
      url: 'https://ftpmirror.gnu.org/gnu/libiconv/libiconv-1.16.tar.gz'
      format: 'tar.gz'
      extract_path: 'libiconv-1.16'
      version: '1.16'
      tools_required:
        - host-autoconf-2.69
        - host-automake-1.16
        - host-libtool
        - host-pkgconf
      regenerate:
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-automake-1.16/share/automake-1.16/config.sub',
            '@THIS_SOURCE_DIR@/build-aux/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-automake-1.16/share/automake-1.16/config.sub',
            '@THIS_SOURCE_DIR@/libcharset/build-aux/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/aclocal/libtool.m4',
            '@THIS_SOURCE_DIR@/m4/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/aclocal/libtool.m4',
            '@THIS_SOURCE_DIR@/libcharset/m4/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/libtool/build-aux/ltmain.sh',
            '@THIS_SOURCE_DIR@/libcharset/build-aux/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/libtool/build-aux/ltmain.sh',
            '@THIS_SOURCE_DIR@/build-aux/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/aclocal/ltversion.m4',
            '@THIS_SOURCE_DIR@/m4/']
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-libtool/share/aclocal/ltversion.m4',
            '@THIS_SOURCE_DIR@/libcharset/m4/']
        - args: [ 'libtoolize', '-cfvi' ]
        - args: ['autoreconf', '-fvi', '-I@THIS_SOURCE_DIR@/m4', '-I@THIS_SOURCE_DIR@/srcm4']
    tools_required:
      - host-gcc
      - host-libtool
    pkgs_required:
      - mlibc
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--with-sysroot=@SYSROOT_DIR@'
        - '--disable-nls'
        - '--enable-shared'
        - '--disable-static'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: gettext
    source:
      subdir: 'sources'
      url: 'https://ftpmirror.gnu.org/gnu/gettext/gettext-0.21.1.tar.xz'
      format: 'tar.xz'
      extract_path: 'gettext-0.21.1'
      version: '0.21.1'
      tools_required:
        - host-autoconf-2.69
        - host-automake-1.16
        - host-libtool
      regenerate:
        - args: ['libtoolize', '-cfvi']
        - args: ['autoreconf', '-fvi']
    tools_required:
      - host-gcc
    pkgs_required:
      - libiconv
      - ncurses
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--enable-nls'
        - '--with-included-gettext'
        - '--disable-c++'
        - '--disable-libasprintf'
        - '--disable-java'
        - '--enable-shared'
        - '--disable-static'
        - '--enable-threads=posix'
        - '--without-git'
        - '--without-cvs'
        - '--without-bzip2'
        - '--without-xz'
    build:
      - args: ['make', '-C', 'gettext-runtime/intl', '-j@PARALLELISM@']
      - args: ['make', '-C', 'gettext-runtime/intl', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: libunistring
    source:
      subdir: 'sources'
      url: 'https://ftpmirror.gnu.org/gnu/libunistring/libunistring-1.1.tar.xz'
      format: 'tar.xz'
      extract_path: 'libunistring-1.1'
      version: '1.0'
      tools_required:
        - host-autoconf-2.69
        - host-automake-1.16
        - host-libtool
        - host-pkgconf
      regenerate:
        - args: [ 'libtoolize', '-cfvi' ]
        - args: [ 'autoreconf', '-fvi' ]
    tools_required:
      - host-gcc
    pkgs_required:
      - mlibc
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--with-sysroot=@SYSROOT_DIR@'
        - '--disable-static'
        - '--enable-shared'
        - '--docdir=/usr/share/doc/libunistring-1.1'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: libxml2
    source:
      subdir: 'sources'
      git: 'https://gitlab.gnome.org/GNOME/libxml2.git'
      tag: 'v2.9.14'
      version: '2.9.14'
      tools_required:
        - host-autoconf-2.69
        - host-automake-1.16
        - host-libtool
        - host-pkgconf
      regenerate:
        - args: [ 'libtoolize', '-cfvi' ]
        - args: [ 'autoreconf', '-fvi' ]
    tools_required:
      - host-gcc
    pkgs_required:
      - mlibc
      - zlib
      - python
      - libiconv
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--with-python=@SYSROOT_DIR@/usr/bin/python3.11'
        - '--disable-static'
        - '--without-threads'
        - '--disable-ipv6'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install-strip']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: freetype
    source:
      subdir: 'sources'
      url: 'https://download-mirror.savannah.gnu.org/releases/freetype/freetype-2.13.0.tar.xz'
      format: 'tar.xz'
      extract_path: 'freetype-2.13.0'
      version: '2.13.0'
      tools_required:
        - host-autoconf-2.69
        - host-automake-1.16
        - host-libtool
        - host-pkgconf
      regenerate:
        - args: ['./autogen.sh']
          environ:
            NOCONFIGURE: '1'
        - args: ['cp',
            '@BUILD_ROOT@/tools/host-automake-1.16/share/automake-1.16/config.sub',
            '@THIS_SOURCE_DIR@/builds/unix/']
    tools_required:
      - host-gcc
    pkgs_required:
      - mlibc
      - libpng
      - zlib
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--disable-static'
        - '--with-harfbuzz=no'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: libpng
    source:
      subdir: 'sources'
      url: 'https://download.sourceforge.net/libpng/libpng-1.6.37.tar.gz'
      format: 'tar.gz'
      extract_path: 'libpng-1.6.37'
      version: '1.6.37'
      tools_required:
        - host-autoconf-2.69
        - host-automake-1.16
        - host-libtool
        - host-pkgconf
      regenerate:
        - args: [ 'libtoolize', '-cfvi' ]
        - args: [ 'autoreconf', '-fvi' ]
    tools_required:
      - host-gcc
    pkgs_required:
      - mlibc
      - zlib
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--with-sysroot=@SYSROOT_DIR@'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install-strip']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: fontconfig
    source:
      subdir: 'sources'
      url: 'https://www.freedesktop.org/software/fontconfig/release/fontconfig-2.14.0.tar.xz'
      format: 'tar.xz'
      extract_path: 'fontconfig-2.14.0'
      version: '2.14.0'
      patch-path-strip: 1
      tools_required:
        - host-autoconf-2.69
        - host-automake-1.16
        - host-libtool
        - host-pkgconf
      regenerate:
        - args: [ 'libtoolize', '-cfvi' ]
        - args: [ 'autoreconf', '-fvi' ]
        # Make sure we regenerate this file
        - args: ['rm', '-f', 'src/fcobjshash.h']
    pkgs_required:
      - mlibc
      - freetype
      - libxml2
      - libiconv
    tools_required:
      - host-autoconf-2.69
      - host-automake-1.16
      - host-gcc
      - host-libtool
      - host-pkgconf
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-docs'
        - '--with-sysroot=@SYSROOT_DIR@'
        - '--enable-libxml2'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install-strip']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: openssl
    source:
      subdir: 'sources'
      url: 'https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1s/openssl-1.1.1s.tar.gz'
      format: 'tar.gz'
      extract_path: 'openssl-1.1.1s'
      version: '1.1.1s'
      patch-path-strip: 1
    tools_required:
      - host-gcc
    pkgs_required:
      - mlibc
      - zlib
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/Configure'
        - '--prefix=/usr'
        - '--openssldir=/etc/ssl'
        - '--libdir=lib'
        - '@OPTION:arch-triple@'
        - 'shared'
        - 'zlib-dynamic'
        - 'no-afalgeng'
        environ:
          CC: '@OPTION:arch-triple@-gcc'
          CXX: '@OPTION:arch-triple@-g++'
          AR: '@OPTION:arch-triple@-ar'
    build:
      - args: ['make', '-j@PARALLELISM@']
      # Disable installing static libraries
      - args: ['sed', '-i', '/INSTALL_LIBS/s/libcrypto.a libssl.a//', '@THIS_BUILD_DIR@/Makefile']
      # Suffix all man pages with ssl
      - args: ['make', 'DESTDIR=@THIS_COLLECT_DIR@', 'MANSUFFIX=ssl', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
      # Move the doc dir to a versioned directory
      - args: ['mv', '@THIS_COLLECT_DIR@/usr/share/doc/openssl', '@THIS_COLLECT_DIR@/usr/share/doc/openssl-1.1.1s']

  - name: python
    from_source: python
    tools_required:
      - host-gcc
      - host-pkgconf
      - host-python
    pkgs_required:
      - mlibc
      - readline
      - libffi
    configure:
      - args: |
          cat > @THIS_BUILD_DIR@/confsite <<EOL
          ac_cv_file__dev_ptmx=yes
          ac_cv_file__dev_ptc=no
          EOL
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--build=x86_64-netbsd'
        - '--prefix=/usr'
        - '--enable-shared'
        - '--with-sysroot=@SYSROOT_DIR@'
        - '--with-readline'
        - '--with-system-ffi'
        - '--with-system-expat'
        - '--disable-ipv6'
        - '--without-ensurepip'
        - '--with-build-python=@BUILD_ROOT@/tools/host-python/bin/python3.11'
        environ:
          CONFIG_SITE: '@THIS_BUILD_DIR@/confsite'
          PKG_CONFIG_SYSROOT_DIR: '@BUILD_ROOT@/system-root'
          PKG_CONFIG_LIBDIR: '@BUILD_ROOT@/system-root/usr/lib/pkgconfig:@BUILD_ROOT@/system-root/usr/share/pkgconfig'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: wget
    source:
      subdir: 'sources'
      url: 'https://ftpmirror.gnu.org/gnu/wget/wget-1.21.4.tar.gz'
      format: 'tar.gz'
      extract_path: 'wget-1.21.4'
      version: '1.21.4'
      tools_required:
        - host-autoconf-2.69
        - host-automake-1.16
        - host-libtool
        - host-autoconf-archive
        - host-pkgconf
      regenerate:
        - args: [ 'libtoolize', '-cfvi' ]
        - args: [ 'autoreconf', '-fvi' ]
    tools_required:
      - host-pkgconf
      - host-gcc
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - openssl
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--disable-nls'
        - '--with-ssl=openssl'
        - '--with-openssl'
        environ:
          gl_cv_header_working_stdint_h: 'yes'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
